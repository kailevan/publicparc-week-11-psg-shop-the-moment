<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Shop the Moment — PSG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Saira:wght@400;500;600&family=Saira+Condensed:wght@600;700;800&display=swap" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/experience.css" />
  </head>
  <body>

    <div class="stage" id="stage">
      <!-- Single source video (no double-half / xray pipeline — too laggy at high fps).
           Starts muted so iOS allows autoplay, JS unmutes on first user gesture. -->
      <video id="match-video" class="stage-video"
             src="assets/video/psg_goal.mp4"
             preload="auto" autoplay muted playsinline></video>
      <div class="dim" id="dim"></div>
    </div>

    <div class="pills" id="pills"></div>
    <div class="moment-caption" id="caption"></div>

    <!-- Standalone PDP card — slides in from the right when a pill is tapped.
         Mirrors the pill column vertically; content swaps when user taps a
         different pill (no scaling, no in-pill expansion). -->
    <div class="pdp-card" id="pdp-card" aria-hidden="true">
      <img class="pdp-img" id="pdp-img" alt="" />
      <div class="pdp-name" id="pdp-name"></div>
      <div class="pdp-price" id="pdp-price">
        <span class="price-was" id="pdp-price-was"></span>
        <span class="price-now" id="pdp-price-now"></span>
      </div>
      <div class="pdp-stage" id="pdp-stage"></div>
    </div>

    <!-- Buy button (Figma 7209:1463) — gradient pill + PSG crest -->
    <div class="buy" id="buy">
      <div class="buy-pill">
        <span class="buy-label">BUY NOW AND SAVE 10%</span>
        <span class="buy-underline"></span>
      </div>
      <img class="buy-logo" src="assets/ui/psg-logo.png" alt="Paris Saint-Germain" />
    </div>

    <!-- Cart icon (bottom-right, mirror of BUY) + drawer (slides up on tap) -->
    <div class="cart" id="cart" role="button" aria-label="Cart">
      <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 7h14l-1.4 11.2a1.5 1.5 0 0 1-1.5 1.3H7.9a1.5 1.5 0 0 1-1.5-1.3L5 7Z"/>
        <path d="M8.5 7V5.5a3.5 3.5 0 0 1 7 0V7"/>
      </svg>
      <span class="cart-count" id="cart-count">0</span>
    </div>

    <div class="cart-drawer" id="cart-drawer" aria-hidden="true">
      <div class="drawer-head">YOUR BAG</div>
      <div class="drawer-items" id="drawer-items">
        <div class="drawer-empty">Empty</div>
      </div>
      <button class="drawer-checkout" type="button">CHECKOUT</button>
    </div>

    <!-- order matters: utils → data → products → experience -->
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/products.js"></script>
    <script src="js/experience.js"></script>
  </body>
</html>
